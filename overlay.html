<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShotAsk — Select Region</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --phosphor-cyan: #00f0ff;
      --phosphor-magenta: #ff00e5;
      --void-deep: #010109;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      cursor: crosshair;
      user-select: none;
      -webkit-user-select: none;
    }

    /* CRT vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(1, 1, 9, 0.7) 100%);
      pointer-events: none;
      z-index: 50;
    }

    #bg-image {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: brightness(0.55) saturate(0.8);
    }

    /* Phosphor selection box */
    #selection {
      position: absolute;
      border: 1.5px solid var(--phosphor-cyan);
      background: rgba(0, 240, 255, 0.04);
      box-shadow:
        0 0 6px rgba(0, 240, 255, 0.2),
        inset 0 0 6px rgba(0, 240, 255, 0.06);
      pointer-events: none;
      z-index: 100;
      display: none;
      animation: selection-glow 1.5s ease-in-out infinite;
    }

    /* Corner accents */
    #selection::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px;
      width: 12px; height: 12px;
      border-top: 2px solid var(--phosphor-cyan);
      border-left: 2px solid var(--phosphor-cyan);
    }
    #selection::after {
      content: '';
      position: absolute;
      bottom: -2px; right: -2px;
      width: 12px; height: 12px;
      border-bottom: 2px solid var(--phosphor-cyan);
      border-right: 2px solid var(--phosphor-cyan);
    }

    #size-indicator {
      position: absolute;
      pointer-events: none;
      z-index: 101;
      display: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--phosphor-cyan);
      background: rgba(1, 1, 9, 0.85);
      border: 1px solid rgba(0, 240, 255, 0.3);
      padding: 3px 8px;
      letter-spacing: 1px;
      text-shadow: 0 0 4px rgba(0, 240, 255, 0.5);
    }

    @keyframes selection-glow {
      0%, 100% { border-color: rgba(0, 240, 255, 0.4); }
      50% { border-color: rgba(0, 240, 255, 0.9); }
    }

    /* Prompt hint */
    #hint {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(0, 240, 255, 0.6);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      letter-spacing: 3px;
      pointer-events: none;
      z-index: 60;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
      transition: opacity 0.3s;
      text-align: center;
    }

    #hint span {
      display: block;
      font-size: 9px;
      color: rgba(0, 240, 255, 0.4);
      margin-top: 4px;
      letter-spacing: 2px;
    }

    /* Loading state */
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 200;
      text-align: center;
    }

    .loader-hex {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      position: relative;
    }

    .loader-hex::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 2px solid rgba(0, 240, 255, 0.1);
      border-top-color: var(--phosphor-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 16px rgba(0, 240, 255, 0.2);
    }

    .loader-hex::after {
      content: '';
      position: absolute;
      inset: 10px;
      border: 1.5px solid rgba(0, 240, 255, 0.06);
      border-bottom-color: rgba(0, 240, 255, 0.3);
      border-radius: 50%;
      animation: spin 1.5s linear infinite reverse;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loading-text {
      color: var(--phosphor-cyan);
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 5px;
      animation: pulse 1.5s ease-in-out infinite;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #loading-sub {
      color: rgba(0, 240, 255, 0.5);
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      letter-spacing: 3px;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="bg-image"></div>
  <div id="selection"></div>
  <div id="size-indicator"></div>
  <div id="hint">
    <span data-i18n="overlay.dragHint">DRAG TO SELECT REGION</span>
    <span data-i18n="overlay.escHint">ESC TO CANCEL</span>
  </div>
  <div id="loading">
    <div class="loader-hex"></div>
    <div id="loading-text" data-i18n="result.analyzing">ANALYZING</div>
    <div id="loading-sub" data-i18n="overlay.sending">SENDING TO AI MODEL</div>
  </div>
  <script type="module" src="/src/overlay.ts"></script>
</body>
</html>
